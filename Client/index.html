<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Job Submission</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <h2>Print Job Submission</h2>
        <form id="printForm">
            <div class="form-group">
                <label for="name"><i class="fas fa-user"></i> Name:</label>
                <input type="text" id="name" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label for="phone"><i class="fas fa-phone"></i> Phone Number:</label>
                <input type="tel" id="phone" placeholder="Enter your phone number" pattern="[0-9]{10}" required>
            </div>

            <div class="form-group">
                <label for="file"><i class="fas fa-file-upload"></i> Upload File:</label>
                <input type="file" id="file" accept=".pdf, .docx, .txt" required>
            </div>

            <div class="form-group">
                <label for="pages"><i class="fas fa-copy"></i> Number of Pages in Document:</label>
                <input type="number" id="pages" min="1" value="1" required>
            </div>

            <div class="form-group">
                <label for="colour"><i class="fas fa-palette"></i> Select Colour:</label>
                <select id="colour">
                    <option value="Blackandwhite">Black and white</option>
                    <option value="colour">Colour</option>
                </select>
            </div>

            <div class="form-group">
                <label for="copies"><i class="fas fa-copy"></i> Number of Copies:</label>
                <input type="number" id="copies" min="1" value="1" required>
            </div>

            <button type="button" id="submitButton">Submit Print Job <i class="fas fa-arrow-right"></i></button>
        </form>
        <div id="loading" class="loading">
            Submitting print job...
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
