<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Job Submission</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>Print Job Submission</h2>
        <form id="printForm">
            <label for="name">Name:</label>
            <input type="text" id="name" required>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" pattern="[0-9]{10}" required>

            <label for="file">Upload File:</label>
            <input type="file" id="file" accept=".pdf, .docx, .txt" required>

            <label for="colour">Select Colour:</label>
            <select id="colour">
                <option value="Blackandwhite">Black and white</option>
                <option value="colour">Colour</option>
            </select>

            <label for="copies">Number of Copies:</label>
            <input type="number" id="copies" min="1" value="1" required>

            <button type="button" onclick="goToPayment()">Submit Print Job</button>
        </form>
    </div>

    <script>
        function goToPayment() {
            window.location.href = "payment.html";
        }
    </script>
</body>
</html>
